<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ subject }}</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f4; font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center" style="padding:30px 15px;">
        <table width="600" cellpadding="0" cellspacing="0"
               style="max-width:600px; background:#ffffff; border-radius:8px; overflow:hidden;">
          
          <!-- Header -->
          <tr>
            <td style="background:#FF6B00; padding:30px 40px; text-align:center;">
              <h1 style="color:#ffffff; margin:0; font-size:26px; font-weight:bold;
                         letter-spacing:2px;">PRRO HEALTH CLUB</h1>
              <p style="color:rgba(255,255,255,0.85); margin:6px 0 0; font-size:13px;">
                Premium Fitness Experience — Mumbai
              </p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:40px; background:#f9f9f9;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:20px 40px; background:#1a1a1a; text-align:center;">
              <p style="color:#888; font-size:12px; margin:0; line-height:1.6;">
                {{ gym_name }} | {{ gym_address }}<br>
                📞 {{ gym_phone }} &nbsp;|&nbsp; ✉️ {{ gym_email }}
              </p>
              <p style="color:#555; font-size:11px; margin:10px 0 0;">
                This is an automated message. Please do not reply.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
